let currentWord = null;

function generateWord() {
  const level = document.getElementById("levelFilter").value;

  let filtered = words;
  if (level !== "all") {
    filtered = words.filter(w => w.level === level);
  }

  const randomIndex = Math.floor(Math.random() * filtered.length);
  currentWord = filtered[randomIndex];

  // Directly sets the text to the word property with no modifications
  document.getElementById("word").textContent = currentWord.word;
  document.getElementById("definition").textContent = currentWord.definition;
  document.getElementById("example").textContent = currentWord.example;
}

function saveWord() {
  if (!currentWord) return;

  let saved = JSON.parse(localStorage.getItem("learnedWords")) || [];

  // Logic to prevent duplicate saves
  if (!saved.find(w => w.word === currentWord.word)) {
    saved.push(currentWord);
  }

  localStorage.setItem("learnedWords", JSON.stringify(saved));
  renderSaved();
}

function renderSaved() {
  const saved = JSON.parse(localStorage.getItem("learnedWords")) || [];
  const container = document.getElementById("savedList");

  container.innerHTML = "<span class='saved-title'>Learned Words:</span>";

  saved.forEach(w => {
    // Basic text append - no numbers or ID suffixes are added here
    container.innerHTML += "<div>" + w.word + "</div>";
  });
}

function speakWord() {
  if (!currentWord) return;
  const speech = new SpeechSynthesisUtterance(currentWord.word);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

// Initial render of saved items from LocalStorage
renderSaved();

</script>
